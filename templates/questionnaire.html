{% extends "base.html" %}

{% block title %}Questionnaire - SUICINO{% endblock %}

{% block content %}
<div class="questionnaire-page">
    <div class="questionnaire-container">
        <h2 class="questionnaire-title">Questionnaire</h2>
        
        <form method="POST" class="questionnaire-form">
            <div class="form-group">
                <label class="form-label">Do you have any diagnosed mental illness?</label>
                <textarea name="mental_illness" class="form-control" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">Do you have a preferred gender for your therapist?</label>
                <select name="preferred_gender" class="form-select">
                    <option value="">No preference</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="non-binary">Non-binary</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Preferred language</label>
                <select name="preferred_language" class="form-select">
                    <option value="english">English</option>
                    <option value="spanish">Spanish</option>
                    <option value="french">French</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-auth-primary">Submit</button>
        </form>
    </div>
</div>
{% endblock %}
