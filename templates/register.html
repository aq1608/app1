{% extends "base.html" %}

{% block title %}Register - SUICINO{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="back-arrow">
            <a href="{{ url_for('index') }}">&larr;</a>
        </div>
        
        <div class="logo-small">
            <div class="logo-text">SUICINO</div>
        </div>
        
        <h2 class="auth-title">Register</h2>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Phone Number (Optional)</label>
                <input type="text" name="phone" class="form-control">
            </div>
            
            <div class="form-group">
                <label class="form-label">Birthday (Optional)</label>
                <input type="date" name="birthday" class="form-control">
            </div>
            
            <button type="submit" class="btn btn-auth-primary">Sign Up</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
