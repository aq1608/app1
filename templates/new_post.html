{% extends "base.html" %}

{% block title %}New Post - SUICINO{% endblock %}

{% block content %}
<div class="app-container">
    <div class="new-post-page">
        <div class="page-header">
            <a href="{{ url_for('forum') }}" class="back-btn">← Back</a>
            <h2>Share Your Story</h2>
        </div>
        
        <form method="POST" class="post-form">
            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" placeholder="What's on your mind?" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Content</label>
                <textarea name="content" class="form-control" rows="8" placeholder="Share your experience, ask for advice, or offer support to others..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary btn-post">Post</button>
        </form>
    </div>
    
    {% include 'bottom_nav.html' %}
</div>
{% endblock %}
